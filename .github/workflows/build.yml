name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Pas de cache: ici → ça passe !

      - name: Setup EAS
        uses: expo/expo-github-action@main
        with:
          eas-version: latest
          packager: npm                # contourne le bug Yarn EAS
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install              # sans --immutable si pas de lock file
        # Ou npm install / yarn install selon votre setup
      
      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --no-wait
